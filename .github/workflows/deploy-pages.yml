name: Deploy Nocturne of Paws to GitHub Pages

# Publishes the prebuilt WebAssembly site in site/ to GitHub Pages.
# configure-pages enables Pages automatically on first run (no manual toggle).
on:
  push:
    branches: ["claude/nocturne-paws-pygame-init-Ir1tv"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
