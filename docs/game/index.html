// ── Cross-Origin Isolation via service worker ────────────────────────────────
// GitHub Pages cannot set COOP/COEP response headers.
// Without them SharedArrayBuffer is unavailable → pygbag hangs on a blank screen.
// The service worker caches CDN assets (~40 MB) so every load after the first
// is instant, and it injects COOP/COEP so WASM works on GitHub Pages.
if (!self.crossOriginIsolated && "serviceWorker" in navigator) {
  // Guard: at most 2 silent reloads per session to avoid infinite loops
  const reloads = +sessionStorage.getItem("coi-r") || 0;
  if (reloads < 2) {
    navigator.serviceWorker.register("coi-serviceworker.js").then(reg => {
      function reload() {
        sessionStorage.setItem("coi-r", reloads + 1);
        location.replace(location.href);
      }
      if (reg.active) { reload(); return; }
      const sw = reg.installing || reg.waiting;
      if (sw) sw.addEventListener("statechange", e => { if (e.target.state === "activated") reload(); });
      navigator.serviceWorker.addEventListener("controllerchange", reload);
    }).catch(e => console.warn("COI service-worker:", e));
  }
}

// ── Early CDN failure detection ───────────────────────────────────────────────
// pygbag's module script (id="site") errors immediately if the CDN is blocked —
// e.g. Brave Shields, firewall, or network issue. Catch it and show a fix within seconds.
(function detectCDNBlock() {
  const siteScript = document.getElementById("site");
  if (!siteScript) return;

  // module script fires "error" if src fails to load
  siteScript.addEventListener("error", function() {
    window.__cdnBlocked = true;
    // Give the page a moment to render, then show the error
    setTimeout(function() {
      if (window.startFired) return;
      var ib = document.getElementById("infobox");
      var hint = document.getElementById("first-load-hint");
      var bar  = document.getElementById("px-bar");
      var safariBtn = document.getElementById("safari-open-btn");
      if (ib)   { ib.textContent = "> CDN BLOCKED"; ib.className = "error"; }
      if (hint) hint.textContent = "BRAVE / ADBLOCK IS BLOCKING\nTHE GAME RUNTIME.\nDISABLE SHIELDS FOR THIS SITE\nOR OPEN IN SAFARI BELOW.";
      if (bar)  bar.textContent  = "████████████████ !!";
      if (safariBtn) safariBtn.style.display = "inline-block";
    }, 800);
  });

  // Fallback: if nothing from pygbag after 15 s, CDN is probably blocked/slow
  setTimeout(function() {
    if (window.startFired || window.__pygbagStarted) return;
    var ib = document.getElementById("infobox");
    var hint = document.getElementById("first-load-hint");
    var safariBtn = document.getElementById("safari-open-btn");
    var ua = navigator.userAgent.toLowerCase();
    var isBrave = (ua.indexOf("brave") > -1) ||
                  (typeof navigator.brave !== "undefined" && navigator.brave.isBrave);
    if (ib) {
      ib.textContent = isBrave ? "> BRAVE SHIELDS BLOCKING CDN" : "> CDN NOT RESPONDING";
      ib.className = "error";
    }
    if (hint) hint.textContent = isBrave
      ? "DISABLE BRAVE SHIELDS FOR\nCANCERVAI.GITHUB.IO\nOR OPEN IN SAFARI:"
      : "CDN FAILED TO LOAD.\nTRY SAFARI OR CHROME:";
    if (safariBtn) safariBtn.style.display = "inline-block";
  }, 15000);
})();

    <script type="application/javascript">
    // ── Touch controls — fire keyboard events into the canvas ────────────────
    const KEY_MAP = {
        bL:    { code: "ArrowLeft",  key: "ArrowLeft"  },
        bR:    { code: "ArrowRight", key: "ArrowRight" },
        bU:    { code: "ArrowUp",    key: "ArrowUp"    },
        bJump: { code: "Space",      key: " "          },
        bHold: { code: "KeyH",       key: "h"          },
        bEnter:{ code: "Enter",      key: "Enter"      },
    };
    function fireKey(code, key, type) {
        const opts = { code, key, bubbles: true, cancelable: true };
        document.dispatchEvent(new KeyboardEvent(type, opts));
        const cv = document.getElementById("canvas");
        if (cv) cv.dispatchEvent(new KeyboardEvent(type, opts));
    }
    Object.entries(KEY_MAP).forEach(([id, { code, key }]) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("touchstart", e => {
            e.preventDefault();
            el.classList.add("pressed");
            fireKey(code, key, "keydown");
        }, { passive: false });
        el.addEventListener("touchend", e => {
            e.preventDefault();
            el.classList.remove("pressed");
            fireKey(code, key, "keyup");
        }, { passive: false });
        el.addEventListener("mousedown", () => { el.classList.add("pressed");    fireKey(code, key, "keydown"); });
        el.addEventListener("mouseup",   () => { el.classList.remove("pressed"); fireKey(code, key, "keyup");   });
    });

    // ── Loading state ────────────────────────────────────────────────────────
    const pxBar   = document.getElementById("px-bar");
    const infobox = document.getElementById("infobox");
    const overlay = document.getElementById("loading-overlay");
    const hint    = document.getElementById("first-load-hint");
    const tCtrls  = document.getElementById("touch-ctrls");
    const progBar = document.getElementById("progress");
    let   startFired = false;
    let   realPct = 0;

    // Block-char progress bar (16 cells)
    const BAR = 16;
    function setBar(pct) {
        pct = Math.min(100, Math.max(0, pct));
        const filled = Math.round(pct / 100 * BAR);
        pxBar.textContent =
            "█".repeat(filled) + "░".repeat(BAR - filled) +
            " " + Math.round(pct) + "%";
    }
    setBar(0);

    // Expose startFired globally so detectCDNBlock() can read it
    window.__pygbagStarted = false;

    // Timed stage messages — tells user exactly what's happening
    const STAGES = [
        [0,     "> LOADING..."],
        [8000,  "> DOWNLOADING\n> PYTHON RUNTIME"],
        [25000, "> COMPILING WASM"],
        [60000, "> STILL GOING...\n> HANG TIGHT"],
        [120000,"> TIMED OUT\n> TRY REFRESHING"],   // 2-min hard timeout
    ];
    // Fake-crawl bar: 0→65% over 90s before real data kicks in
    let fakePct = 0;
    const ticker = setInterval(() => {
        if (startFired) { clearInterval(ticker); return; }
        fakePct = Math.min(fakePct + 0.72, 65);
        if (fakePct > realPct) setBar(fakePct);
    }, 1000);
    STAGES.forEach(([ms, msg]) => {
        setTimeout(() => {
            if (!startFired && !window.__cdnBlocked) {
                infobox.textContent = msg;
                if (ms >= 120000) {
                    infobox.classList.add("error");
                    clearInterval(ticker);
                    hint.textContent = "TRY: CLOSE & REOPEN IN SAFARI";
                    document.getElementById("safari-open-btn").style.display = "inline-block";
                }
            }
        }, ms);
    });

    // Mirror pygbag's real progress element (overrides fake)
    if (progBar) {
        new MutationObserver(() => {
            const pct = Math.round((progBar.value / (progBar.max || 100)) * 100);
            if (pct > realPct) { realPct = pct; setBar(pct); }
        }).observe(progBar, { attributes: true, attributeFilter: ["value"] });
    }

    // Watch status div (pygbag writes download text here)
    const statusEl = document.getElementById("status");
    if (statusEl) {
        new MutationObserver(() => {
            const txt = (statusEl.textContent || "").trim().toUpperCase();
            if (txt) { infobox.textContent = "> " + txt; hint.style.display = "none"; }
        }).observe(statusEl, { childList: true, characterData: true, subtree: true });
    }

    // Watch infobox for pygbag Python messages
    new MutationObserver(() => {
        const txt = (infobox.textContent || "").toLowerCase();
        if (txt.includes("installing") || txt.includes("extracting")) {
            hint.style.display = "none";
            realPct = Math.max(realPct, 75); setBar(realPct);
        }
        if (!startFired && (txt.includes("ready") || txt.includes("click/touch") || txt.includes("please"))) {
            clearInterval(ticker);
            setBar(100);
            infobox.textContent = "> TAP TO BEGIN";
            infobox.classList.add("ready");
            document.addEventListener("click",    onFirstGesture, { once: true });
            document.addEventListener("touchend", onFirstGesture, { once: true, passive: false });
        }
    }).observe(infobox, { childList: true, characterData: true, subtree: true });

    // Watch for infobox hidden (game running)
    new MutationObserver(() => {
        if (infobox.style.display === "none" && !startFired) {
            startFired = true; clearInterval(ticker); fadeOverlay();
        }
    }).observe(infobox, { attributes: true, attributeFilter: ["style"] });

    function onFirstGesture(e) {
        if (e.cancelable) e.preventDefault();
        if (window.MM) window.MM.UME = true;
    }
    function fadeOverlay() {
        overlay.classList.add("fade-out");
        setTimeout(() => { overlay.style.display = "none"; }, 400);
        if (window.matchMedia("(pointer: coarse)").matches) tCtrls.classList.add("visible");
    }

    // ── iPhone 6 Plus: fix iOS Safari viewport height + orient hint ──────────
    (function iosViewport() {
        const hint = document.getElementById("orient-hint");
        let hintTimer = null;

        function update() {
            const portrait = window.innerHeight > window.innerWidth;
            // Show landscape nudge briefly when in portrait and game is running
            if (portrait && hint && startFired) {
                hint.style.display = "block";
                clearTimeout(hintTimer);
                hintTimer = setTimeout(() => { hint.style.display = "none"; }, 4000);
            }
        }

        window.addEventListener("orientationchange", () => {
            // Small delay so the browser has resized before we measure
            setTimeout(update, 150);
        });
        window.addEventListener("resize", update);
    })();

    // ── Required pygbag JS callbacks ─────────────────────────────────────────
    globalThis.__canvas_resized = () => {};

    async function custom_onload(debug_hidden) {
        ["pyconsole","system","transfer","info","box"].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.hidden = true;
        });
    }
    function custom_prerun()  {}
    function custom_postrun() {}

    function window_resize() {
        if (typeof Module !== "undefined" && typeof Module.window_resize === "function")
            Module.window_resize();
    }
    function info_inline() {}
    function info_online() {}
    function frame_online() {}
    </script>

</body>
