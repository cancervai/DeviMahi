// ── Cross-Origin Isolation via service worker ────────────────────────────────
// GitHub Pages cannot set COOP/COEP response headers.
// Without them SharedArrayBuffer is unavailable → pygbag hangs on a blank screen.
// The service worker caches CDN assets (~40 MB) so every load after the first
// is instant, and it injects COOP/COEP so WASM works on GitHub Pages.
if (!self.crossOriginIsolated && "serviceWorker" in navigator) {
  // Guard: at most 2 silent reloads per session to avoid infinite loops
  const reloads = +sessionStorage.getItem("coi-r") || 0;
  if (reloads < 2) {
    navigator.serviceWorker.register("coi-serviceworker.js").then(reg => {
      function reload() {
        sessionStorage.setItem("coi-r", reloads + 1);
        location.replace(location.href);
      }
      if (reg.active) { reload(); return; }
      const sw = reg.installing || reg.waiting;
      if (sw) sw.addEventListener("statechange", e => { if (e.target.state === "activated") reload(); });
      navigator.serviceWorker.addEventListener("controllerchange", reload);
    }).catch(e => console.warn("COI service-worker:", e));
  }
}

    <script type="application/javascript">
    // ── Touch controls — fire keyboard events into the canvas ────────────────
    const KEY_MAP = {
        bL:    { code: "ArrowLeft",  key: "ArrowLeft"  },
        bR:    { code: "ArrowRight", key: "ArrowRight" },
        bU:    { code: "ArrowUp",    key: "ArrowUp"    },
        bJump: { code: "Space",      key: " "          },
        bHold: { code: "KeyH",       key: "h"          },
        bEnter:{ code: "Enter",      key: "Enter"      },
    };
    function fireKey(code, key, type) {
        const opts = { code, key, bubbles: true, cancelable: true };
        document.dispatchEvent(new KeyboardEvent(type, opts));
        const cv = document.getElementById("canvas");
        if (cv) cv.dispatchEvent(new KeyboardEvent(type, opts));
    }
    Object.entries(KEY_MAP).forEach(([id, { code, key }]) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener("touchstart", e => {
            e.preventDefault();
            el.classList.add("pressed");
            fireKey(code, key, "keydown");
        }, { passive: false });
        el.addEventListener("touchend", e => {
            e.preventDefault();
            el.classList.remove("pressed");
            fireKey(code, key, "keyup");
        }, { passive: false });
        el.addEventListener("mousedown", () => { el.classList.add("pressed");    fireKey(code, key, "keydown"); });
        el.addEventListener("mouseup",   () => { el.classList.remove("pressed"); fireKey(code, key, "keyup");   });
    });

    // ── Loading progress ────────────────────────────────────────────────────
    const pfill   = document.getElementById("pfill");
    const infobox = document.getElementById("infobox");
    const overlay = document.getElementById("loading-overlay");
    const hint    = document.getElementById("first-load-hint");
    const tCtrls  = document.getElementById("touch-ctrls");
    const progBar = document.getElementById("progress");
    let   startFired = false;
    let   pygbagUpdated = false;  // true once pygbag writes to infobox

    // ── Cycling loading messages (shown until pygbag sends its own) ─────────
    const MSGS = [
        "Summoning the velvet night…",
        "Weaving shadows into silk…",
        "Calling the moon-cats home…",
        "Brewing stardust and crimson…",
        "Unfurling the gothic scroll…",
        "Lighting candle-paths…",
        "Binding shadow to parchment…",
        "Still loading — hang tight…",
    ];
    let msgIdx = 0;
    const msgTimer = setInterval(() => {
        if (!pygbagUpdated && !startFired) {
            infobox.textContent = MSGS[msgIdx % MSGS.length];
            msgIdx++;
        } else {
            clearInterval(msgTimer);
        }
    }, 4000);

    // ── Animate the progress bar even before pygbag sends real data ─────────
    // Fake-crawl from 0 → 60 % over 90 s so bar moves from the start.
    let fakeProgress = 0;
    const fakeTimer = setInterval(() => {
        if (startFired) { clearInterval(fakeTimer); return; }
        fakeProgress = Math.min(fakeProgress + 0.67, 60);  // ~60% over 90s
        const cur = parseFloat(pfill.style.width) || 0;
        if (fakeProgress > cur) pfill.style.width = fakeProgress.toFixed(1) + "%";
    }, 1000);

    // Mirror pygbag's real progress element (overrides fake when available)
    if (progBar) {
        new MutationObserver(() => {
            const pct = Math.round((progBar.value / (progBar.max || 100)) * 100);
            if (pct > 0) {
                const cur = parseFloat(pfill.style.width) || 0;
                if (pct > cur) pfill.style.width = pct + "%";
            }
        }).observe(progBar, { attributes: true, attributeFilter: ["value"] });
    }

    // Mirror status div (pygbag writes "Downloading..." etc. here)
    const statusEl = document.getElementById("status");
    if (statusEl) {
        new MutationObserver(() => {
            const txt = (statusEl.textContent || "").trim();
            if (txt && !pygbagUpdated) {
                pygbagUpdated = true;
                hint.style.display = "none";  // hide first-load hint once real status shows
                infobox.textContent = txt;
            }
        }).observe(statusEl, { childList: true, characterData: true, subtree: true });
    }

    // Watch for infobox text updates from pygbag Python
    new MutationObserver(() => {
        const txt = (infobox.textContent || "").toLowerCase();
        // Only react to pygbag's own messages (not our cycling messages)
        if (txt.includes("installing") || txt.includes("loading") || txt.includes("extracting")) {
            pygbagUpdated = true;
            hint.style.display = "none";
            pfill.style.width = "75%";
        }
        if (!startFired && (txt.includes("ready") || txt.includes("click/touch") || txt.includes("please"))) {
            clearInterval(fakeTimer);
            pfill.style.width = "100%";
            infobox.textContent = "✦ tap anywhere to begin ✦";
            infobox.classList.add("ready");
            document.addEventListener("click",    onFirstGesture, { once: true });
            document.addEventListener("touchend", onFirstGesture, { once: true, passive: false });
        }
    }).observe(infobox, { childList: true, characterData: true, subtree: true });

    // Watch for infobox being hidden (pygbag hides it when the game is fully running)
    new MutationObserver(() => {
        if (infobox.style.display === "none" && !startFired) {
            startFired = true;
            clearInterval(fakeTimer);
            clearInterval(msgTimer);
            fadeOverlay();
        }
    }).observe(infobox, { attributes: true, attributeFilter: ["style"] });

    function onFirstGesture(e) {
        if (e.cancelable) e.preventDefault();
        if (window.MM) window.MM.UME = true;
    }

    function fadeOverlay() {
        overlay.classList.add("fade-out");
        setTimeout(() => { overlay.style.display = "none"; }, 900);
        if (window.matchMedia("(pointer: coarse)").matches) {
            tCtrls.classList.add("visible");
        }
    }

    // ── iPhone 6 Plus: fix iOS Safari viewport height + orient hint ──────────
    (function iosViewport() {
        const hint = document.getElementById("orient-hint");
        let hintTimer = null;

        function update() {
            const portrait = window.innerHeight > window.innerWidth;
            // Show landscape nudge briefly when in portrait and game is running
            if (portrait && hint && startFired) {
                hint.style.display = "block";
                clearTimeout(hintTimer);
                hintTimer = setTimeout(() => { hint.style.display = "none"; }, 4000);
            }
        }

        window.addEventListener("orientationchange", () => {
            // Small delay so the browser has resized before we measure
            setTimeout(update, 150);
        });
        window.addEventListener("resize", update);
    })();

    // ── Required pygbag JS callbacks ─────────────────────────────────────────
    globalThis.__canvas_resized = () => {};

    async function custom_onload(debug_hidden) {
        ["pyconsole","system","transfer","info","box"].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.hidden = true;
        });
    }
    function custom_prerun()  {}
    function custom_postrun() {}

    function window_resize() {
        if (typeof Module !== "undefined" && typeof Module.window_resize === "function")
            Module.window_resize();
    }
    function info_inline() {}
    function info_online() {}
    function frame_online() {}
    </script>
